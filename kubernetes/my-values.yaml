USER-SUPPLIED VALUES:
additionalPrometheusRulesMap:
  custom-rules:
    groups:
    - name: node-usage-alerts
      rules:
      - alert: NodeDown
        annotations:
          summary: 'CRITICAL: Node is down!'
        expr: up{job="node-exporter"} == 0
        for: 10s
        labels:
          severity: critical
      - alert: HighCPUUsage
        annotations:
          summary: High CPU usage detected
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[1m]))
          * 100) > 50
        for: 10s
        labels:
          severity: warning
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes
          * 100 > 60
        for: 10s
        labels:
          severity: warning
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})
          * 100 < 20
        for: 10s
        labels:
          severity: critical
    - name: kubernetes-health-alerts
      rules:
      - alert: PodFailing
        annotations:
          description: Pod {{ $labels.pod }} is failing in {{ $labels.namespace }}
        expr: kube_pod_status_phase{phase=~"Failed|Unknown"} > 0 or rate(kube_pod_container_status_restarts_total[1m])
          > 0
        for: 10s
        labels:
          severity: critical
      - alert: PodPendingStuck
        expr: kube_pod_status_phase{phase="Pending"} > 0
        for: 10s
        labels:
          severity: warning
      - alert: DeploymentIncomplete
        expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
        for: 10s
        labels:
          severity: warning
alertmanager:
  alertmanagerSpec:
    configMapOverrideName: ""
    configSecret: alertmanager-monitoring-stack-kube-prom-alertmanager
    externalUrl: http://localhost/alert-dashboard
    routePrefix: /
    skipConfigRender: true
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
          storageClassName: ebs-sc
  enabled: true
grafana:
  admin:
    existingSecret: monitoring-secrets
    passwordKey: admin-password
    userKey: admin-user
  grafana.ini:
    server:
      root_url: '%(protocol)s://%(domain)s:%(http_port)s/grafana-dashboard'
      serve_from_sub_path: true
  persistence:
    accessModes:
    - ReadWriteOnce
    enabled: true
    size: 10Gi
    storageClassName: ebs-sc
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
prometheus:
  prometheusSpec:
    externalUrl: /prom-dashboard
    podMonitorSelectorNilUsesHelmValues: false
    routePrefix: /prom-dashboard
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
          storageClassName: ebs-sc
